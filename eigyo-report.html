<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>営業訪問レポート</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #01696f;
      --primary-light: #e0f0ef;
      --primary-dark: #0c4e54;
      --bg: #f7f6f2;
      --surface: #ffffff;
      --surface2: #f9f8f5;
      --border: #e0ddd8;
      --text: #28251d;
      --muted: #7a7974;
      --success: #437a22;
      --radius: 0.75rem;
      --transition: 180ms cubic-bezier(0.16,1,0.3,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding:1rem}
    .app{max-width:480px;margin:0 auto}
    .card{background:var(--surface);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(40,37,29,.07)}
    .label{font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.75rem}
    .date-tabs{display:flex;gap:.5rem;margin-bottom:.75rem}
    .date-tab{flex:1;padding:.5rem;border-radius:.5rem;border:1.5px solid var(--border);background:var(--surface2);font-family:inherit;font-size:.875rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all var(--transition);text-align:center}
    .date-tab.active,.date-tab:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
    .date-input{width:100%;padding:.75rem 1rem;border-radius:.5rem;border:1.5px solid var(--border);background:var(--surface2);font-family:inherit;font-size:.875rem;color:var(--text);transition:border-color var(--transition)}
    .date-input:focus{outline:none;border-color:var(--primary)}
    .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    .badge{font-size:.75rem;font-weight:600;background:var(--primary-light);color:var(--primary);padding:2px 8px;border-radius:999px}
    .category{margin-bottom:1.25rem}
    .category:last-child{margin-bottom:0}
    .cat-name{font-size:.75rem;font-weight:600;color:var(--muted);letter-spacing:.06em;margin-bottom:.5rem;padding-bottom:.5rem;border-bottom:1px solid #dcd9d5}
    .client-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
    .client-card{position:relative}
    .client-card input{position:absolute;opacity:0;width:0;height:0}
    .client-label{display:flex;align-items:center;gap:.5rem;padding:.75rem;border-radius:.5rem;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;transition:all var(--transition);user-select:none}
    .client-label:hover,.client-card input:checked+.client-label{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
    .check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all var(--transition);position:relative}
    .client-card input:checked+.client-label .check{background:var(--primary);border-color:var(--primary)}
    .client-card input:checked+.client-label .check::after{content:"";position:absolute;width:5px;height:9px;border:2.5px solid white;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
    .client-name{font-size:.875rem;font-weight:500;line-height:1.3}
    .memo{width:100%;padding:.75rem 1rem;border-radius:.5rem;border:1.5px solid var(--border);background:var(--surface2);font-family:inherit;font-size:.875rem;color:var(--text);resize:vertical;min-height:80px;transition:border-color var(--transition)}
    .memo:focus{outline:none;border-color:var(--primary)}
    .memo::placeholder{color:var(--muted)}
    .btn{width:100%;padding:1rem 1.5rem;border-radius:var(--radius);background:var(--primary);color:white;font-family:inherit;font-size:1rem;font-weight:700;border:none;cursor:pointer;transition:all var(--transition);display:flex;align-items:center;justify-content:center;gap:.5rem;box-shadow:0 2px 8px rgba(1,105,111,.3)}
    .btn:hover{background:var(--primary-dark)}
    .btn:active{transform:scale(.98)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .loading{text-align:center;padding:3rem;color:var(--muted);font-size:.875rem}
    .success{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:2rem}
    .success.show{display:flex}
    .success-icon{width:72px;height:72px;background:#eef5e9;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem;color:var(--success)}
    .success-title{font-size:1.25rem;font-weight:700;margin-bottom:.75rem}
    .success-detail{font-size:.875rem;color:var(--muted);line-height:1.7}
    .btn-reset{margin-top:1.5rem;padding:.75rem 1.5rem;border-radius:var(--radius);background:var(--surface);border:1.5px solid var(--border);font-family:inherit;font-size:.875rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all var(--transition)}
    .btn-reset:hover{border-color:var(--primary);color:var(--primary)}
    .user-chip{display:inline-flex;align-items:center;gap:.4rem;background:var(--primary-light);color:var(--primary);font-size:.8rem;font-weight:600;padding:.3rem .75rem;border-radius:999px}
    .warn-banner{background:#fff3cd;border:1.5px solid #f0c040;border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1rem;font-size:.875rem;line-height:1.6;display:none}
    .warn-banner.show{display:block}
  </style>
</head>
<body>
<div class="app" id="mainForm">

  <div class="warn-banner" id="warnBanner">
    ⚠️ ユーザー情報を取得できませんでした。<br>
    <strong>LINEアプリのリッチメニュー</strong>から開いてください。
  </div>

  <div class="card">
    <div style="font-size:1.2rem;font-weight:700;display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#01696f" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
      営業訪問レポート
    </div>
    <div id="userChipArea" style="margin-top:.5rem"></div>
    <div style="font-size:.8rem;color:var(--muted);margin-top:.25rem">訪問した日付と先を選んで送信してください</div>
  </div>

  <div class="card">
    <div class="label">📅 訪問日</div>
    <div class="date-tabs">
      <button class="date-tab active" data-type="today"      onclick="setDate('today',this)">今日</button>
      <button class="date-tab"        data-type="yesterday"  onclick="setDate('yesterday',this)">昨日</button>
      <button class="date-tab"        data-type="other"      onclick="setDate('other',this)">指定する</button>
    </div>
    <input type="date" id="dateInput" class="date-input">
  </div>

  <div class="card" id="clientsCard">
    <div class="section-header">
      <div class="label" style="margin-bottom:0">🏢 訪問先</div>
      <span class="badge" id="countBadge">0件選択中</span>
    </div>
    <div id="clientsArea"><div class="loading">読み込み中...</div></div>
  </div>

  <div class="card">
    <div class="label">📝 メモ（任意）</div>
    <textarea class="memo" id="memoInput" placeholder="商談内容、サンプル提供、次回アポなど…"></textarea>
  </div>

  <div style="padding-bottom:env(safe-area-inset-bottom,16px)">
    <button class="btn" id="submitBtn" onclick="submitReport()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
      <span id="submitLabel">訪問先を選択してください</span>
    </button>
  </div>
</div>

<div class="success" id="successScreen">
  <div class="success-icon">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
  </div>
  <div class="success-title">送信しました！</div>
  <div class="success-detail" id="successDetail"></div>
  <button class="btn-reset" onclick="resetForm()">もう一件追加する</button>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbysL386BpL7xOK_j3ztUMlFilDb20hpCAsSN7I8MQTI9lq_nZ656kFjTv8N6TFwtlO3/exec";

function base64UrlDecode(str) {
  let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
  const pad = base64.length % 4;
  if (pad === 2) base64 += '==';
  else if (pad === 3) base64 += '=';
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) { bytes[i] = binary.charCodeAt(i); }
  return new TextDecoder().decode(bytes);
}

function getUserFromUrl() {
  try {
    const hash    = location.hash.slice(1);
    const params  = new URLSearchParams(hash);
    const idToken = params.get("id_token");
    if (!idToken) return null;
    const payloadB64 = idToken.split(".")[1];
    const payload    = JSON.parse(base64UrlDecode(payloadB64));
    return { userId: payload.sub || "", displayName: payload.name || "" };
  } catch (e) {
    console.error("id_token parse error:", e);
    return null;
  }
}

let userName = "";
let userId   = "";

const user = getUserFromUrl();
if (user && user.userId) {
  userId   = user.userId;
  userName = user.displayName;
  document.getElementById("userChipArea").innerHTML = `<span class="user-chip">👤 ${userName}</span>`;
} else {
  document.getElementById("warnBanner").classList.add("show");
}

const dateInput   = document.getElementById("dateInput");
const submitBtn   = document.getElementById("submitBtn");
const submitLabel = document.getElementById("submitLabel");

function toJST(d) {
  return new Date(d.getTime() + 9 * 3600000).toISOString().slice(0, 10);
}
dateInput.value    = toJST(new Date());
dateInput.readOnly = true;

function setDate(type, el) {
  document.querySelectorAll(".date-tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  const now = new Date();
  if (type === "today")          { dateInput.value = toJST(now);                    dateInput.readOnly = true;  }
  else if (type === "yesterday") { dateInput.value = toJST(new Date(now-86400000)); dateInput.readOnly = true;  }
  else                           {                                                   dateInput.readOnly = false; dateInput.focus(); }
}

function loadClients() {
  fetch(GAS_URL)
    .then(r => r.json())
    .then(clients => renderClients(clients))
    .catch(() => renderClients([
      { name: "白崎海洋公園", category: "道の駅" },
      { name: "中津",         category: "道の駅" },
      { name: "かえるの港",   category: "道の駅" }
    ]));
}

function renderClients(clients) {
  const area    = document.getElementById("clientsArea");
  const grouped = {};
  clients.forEach(c => {
    const cat = c.category || "その他";
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(c.name);
  });
  let html = "";
  Object.keys(grouped).forEach(cat => {
    html += `<div class="category"><div class="cat-name">${cat}</div><div class="client-grid">`;
    grouped[cat].forEach(name => {
      const id = "c_" + name;
      html += `<div class="client-card">
        <input type="checkbox" id="${id}" value="${name}" onchange="updateCount()">
        <label class="client-label" for="${id}">
          <span class="check"></span>
          <span class="client-name">${name}</span>
        </label>
      </div>`;
    });
    html += `</div></div>`;
  });
  area.innerHTML = html;
}

function updateCount() {
  const checked = [...document.querySelectorAll("input[type=checkbox]:checked")];
  document.getElementById("countBadge").textContent = checked.length + "件選択中";
  if (checked.length > 0) {
    submitBtn.disabled = false;
    submitLabel.textContent = `${checked.length}件の訪問を記録する`;
  } else {
    submitBtn.disabled = true;
    submitLabel.textContent = "訪問先を選択してください";
  }
}

async function submitReport() {
  const date   = dateInput.value;
  const memo   = document.getElementById("memoInput").value;
  const visits = [...document.querySelectorAll("input[type=checkbox]:checked")].map(c => c.value);
  if (!date || visits.length === 0) return;
  submitBtn.disabled      = true;
  submitLabel.textContent = "送信中...";
  const payload = {
    date, visits, memo, userName, userId,
    reportedAt: new Date().toISOString(),
    isUserIdMissing: !userId
  };
  try {
    await fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
  } catch (e) { console.error("送信エラー:", e); }
  showSuccess(date, visits, memo);
}

function showSuccess(date, visits, memo) {
  document.getElementById("mainForm").style.display = "none";
  const sc = document.getElementById("successScreen");
  sc.classList.add("show");
  const d = date.replace(/-/g, "/");
  let txt = `<strong>${d}</strong> の訪問先：<br>${visits.join("、")}`;
  if (memo)     txt += `<br><br>📝 ${memo}`;
  if (userName) txt += `<br><br>👤 ${userName}`;
  if (!userId)  txt += `<br><small style="color:#c0392b">※ユーザーID未取得</small>`;
  document.getElementById("successDetail").innerHTML = txt;
}

function resetForm() {
  document.querySelectorAll("input[type=checkbox]").forEach(c => c.checked = false);
  document.getElementById("memoInput").value = "";
  dateInput.value    = toJST(new Date());
  dateInput.readOnly = true;
  document.querySelectorAll(".date-tab").forEach(t => t.classList.remove("active"));
  document.querySelector('[data-type="today"]').classList.add("active");
  updateCount();
  document.getElementById("mainForm").style.display = "";
  document.getElementById("successScreen").classList.remove("show");
}

loadClients();
</script>
</body>
</html>
